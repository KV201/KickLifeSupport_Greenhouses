// =========================================================
// HARDWARE PATCHES — KickLifeSupport
// Adds hardware features to KPBS and stock parts.
// =========================================================

// ---------------------------------------------------------
// Water Purifier — WasteWater → Water
// ---------------------------------------------------------
@PART[KKAOSS_LS_container_waterpurifier]:NEEDS[KickLifeSupport]:FINAL
{
    MODULE
    {
        name = ModuleResourceConverter
        converterName = Water Purifier
        startActionName = Start Purifier
        stopActionName = Stop Purifier
        toggleActionName = Toggle Purifier
        autoActivate = false
        shutdownIfEmpty = true
        GeneratesHeat = false
        useSpecializedBonus = false

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.05
        }

        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.000045
            DumpExcess = false
        }
    }
}

// ---------------------------------------------------------
// Emergency O₂ reserve + CDRA defaults on all LS parts
// ---------------------------------------------------------
@PART[*]:HAS[@MODULE[KickLifeSupportModule]]:FINAL
{
    @MODULE[KickLifeSupportModule]
    {
        %emergencyO2Level = 100
        %filterCondition = 1
    }
}
