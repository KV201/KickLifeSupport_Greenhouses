// =========================================================
// HARDWARE PATCHES
// Water purifier on stock science lab, emergency O₂ + CDRA
// defaults on all LS parts.
// =========================================================

// Stock Science Lab — water purifier
@PART[Large_Crewed_Lab]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
        emergencyO2Level = 100
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Water Purifier
        startActionName = Start Purifier
        stopActionName = Stop Purifier
        toggleActionName = Toggle Purifier

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.05
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.000045
            DumpExcess = false
        }
    }
}

// Water Purifier container
@PART[KKAOSS_LS_container_waterpurifier]:FINAL
{
    MODULE
    {
        name = ModuleResourceConverter
        converterName = Water Purifier
        startActionName = Start Purifier
        stopActionName = Stop Purifier
        toggleActionName = Toggle Purifier

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.05
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.000045
            DumpExcess = false
        }
    }
}

// Emergency O₂ + defaults on all LS parts
@PART[*]:HAS[@MODULE[KickLifeSupportModule]]:FINAL
{
    @MODULE[KickLifeSupportModule]
    {
        %emergencyO2Level = 100
        %filterCondition = 1
    }
}
