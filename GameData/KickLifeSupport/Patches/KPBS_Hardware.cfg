// ISRU parts — CDRA scrubber, emergency O2, water extraction + waste recycling
@PART[ISRU|MiniISRU|KKAOSS_ISRU_g]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
        emergencyO2Level = 100
    }

    // Water extraction: Ore + Hydrogen + EC → Water
    MODULE
    {
        name = ModuleResourceConverter
        converterName = ISRU Water Extraction
        startActionName = Start Water Extraction
        stopActionName = Stop Water Extraction
        toggleActionName = Toggle Water Extraction

        INPUT_RESOURCE
        {
            ResourceName = Ore
            Ratio = 0.01
        }
        INPUT_RESOURCE
        {
            ResourceName = Hydrogen
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.5
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.01
            DumpExcess = false
        }
    }

    // Waste recycling: Waste + Ore + EC → Fertilizer
    MODULE
    {
        name = ModuleResourceConverter
        converterName = ISRU Waste Recycling
        startActionName = Start Waste Recycling
        stopActionName = Stop Waste Recycling
        toggleActionName = Toggle Waste Recycling

        INPUT_RESOURCE
        {
            ResourceName = Waste
            Ratio = 0.000018
        }
        INPUT_RESOURCE
        {
            ResourceName = Ore
            Ratio = 0.001
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.2
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Fertilizer
            Ratio = 0.0005
            DumpExcess = false
        }
    }

    // Hydrogen buffer for ISRU water extraction
    %RESOURCE[Hydrogen]
    {
        amount = 0
        maxAmount = 100
    }
}

// Emergency O2 + defaults on all LS parts
@PART[*]:HAS[@MODULE[KickLifeSupportModule]]:FINAL
{
    @MODULE[KickLifeSupportModule]
    {
        %emergencyO2Level = 100
        %filterCondition = 1
    }
}
