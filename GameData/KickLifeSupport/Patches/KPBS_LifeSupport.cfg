// ---------------------------------------------------------
// Sabatier Reactor — CDRA + LiOH + LF/OX converter
// ---------------------------------------------------------
@PART[KKAOSS_LS_container_sabatier]:FINAL:NEEDS[KickLifeSupport]
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Sabatier
        startActionName = Start
        stopActionName = Stop
        toggleActionName = Toggle

        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 2.0
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.01
        }
        OUTPUT_RESOURCE
        {
            ResourceName = LiquidFuel
            Ratio = 0.004
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxidizer
            Ratio = 0.005
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.001
            DumpExcess = false
        }
    }
}

