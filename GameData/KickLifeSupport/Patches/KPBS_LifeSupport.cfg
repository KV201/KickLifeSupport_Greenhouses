// ---------------------------------------------------------
// ECLSS Tanks — KICKLS-specific (CDRA + LiOH)
// ---------------------------------------------------------
@PART[KKAOSS_LS_container_eclss_small]:FOR[PlanetarySurfaceStructures]:NEEDS[KickLifeSupport]
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}

