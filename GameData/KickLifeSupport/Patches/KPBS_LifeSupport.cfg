// =========================================================
// KPBS LIFE SUPPORT PATCH — KickLifeSupport
// Adds KICKLS resources & modules to KPBS storage/utility parts.
//
// Generic resources (O2, Water, Food, etc.) are only added when
// no other LS mod provides them, to avoid duplicate resources.
// KICKLS-specific additions (CDRA, LiOH) are unconditional.
//
// Other LS mods that have their own KPBS patches:
//   TacLifeSupport | USILifeSupport | IoncrossCrewSupport
//   LifeSupport | Kerbalism | IFILifeSupport | Snacks
// =========================================================

// ---------------------------------------------------------
// O2 Storage — KICKLS-specific
// ---------------------------------------------------------
@PART[KKAOSS_LS_container_oxygen_small]:FOR[PlanetarySurfaceStructures]:NEEDS[KickLifeSupport]
{
    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}

@PART[KKAOSS_LS_container_oxygen_big]:FOR[PlanetarySurfaceStructures]:NEEDS[KickLifeSupport]
{
    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}

// O2 Storage — generic resources (standalone only)
@PART[KKAOSS_LS_container_oxygen_small]:FOR[PlanetarySurfaceStructures]:NEEDS[KickLifeSupport]:!NEEDS[TacLifeSupport|USILifeSupport|IoncrossCrewSupport|LifeSupport|Kerbalism|IFILifeSupport|Snacks]
{
    %RESOURCE[Oxygen]
    {
        amount = 1300
        maxAmount = 1300
    }
}

@PART[KKAOSS_LS_container_oxygen_big]:FOR[PlanetarySurfaceStructures]:NEEDS[KickLifeSupport]:!NEEDS[TacLifeSupport|USILifeSupport|IoncrossCrewSupport|LifeSupport|Kerbalism|IFILifeSupport|Snacks]
{
    %RESOURCE[Oxygen]
