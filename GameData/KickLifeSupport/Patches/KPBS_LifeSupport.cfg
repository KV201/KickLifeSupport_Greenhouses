// ---------------------------------------------------------
// Mini Greenhouse Container — fix converter old syntax
// ---------------------------------------------------------
@PART[KKAOSS_LS_container_greenhouse]:FINAL:NEEDS[KickLifeSupport]
{
    !MODULE[ModuleResourceConverter] {}

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Greenhouse
        startActionName = Start
        stopActionName = Stop
        toggleActionName = Toggle

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.02
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxygen
            Ratio = 0.004
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Food
            Ratio = 0.00001
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.00002
            DumpExcess = false
        }
    }

    !RESOURCE[Fertilizer] {}
}

