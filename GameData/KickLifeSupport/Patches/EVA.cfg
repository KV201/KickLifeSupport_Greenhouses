// EVA Life Support — 7 hours of O2, Food, Water
@PART[kerbalEVA|kerbalEVAfemale|kerbalEVASlimSuit|kerbalEVASlimSuitFemale]:FINAL
{
    %RESOURCE[Oxygen]
    {
        amount = 130
        maxAmount = 130
    }
    %RESOURCE[Food]
    {
        amount = 0.6
        maxAmount = 0.6
    }
    %RESOURCE[Water]
    {
        amount = 0.8
        maxAmount = 0.8
    }
}
