// ---------------------------------------------------------
// Bioreactors — CDRA + CO2+Waste → Fertilizer+O2
// ---------------------------------------------------------
@PART[mmgh-pbr-1875,mmgh-pbr-250,mmgh-pbr-375]:FINAL:NEEDS[KickLifeSupport]
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Bioreactor
        startActionName = Start Bioreactor
        stopActionName = Stop Bioreactor
        toggleActionName = Toggle Bioreactor

        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = Waste
            Ratio = 0.000018
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.5
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Fertilizer
            Ratio = 0.0005
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxygen
            Ratio = 0.004
            DumpExcess = false
        }
    }

    %RESOURCE[Fertilizer]
    {
        amount = 0
        maxAmount = 50
    }
    %RESOURCE[CarbonDioxide]
    {
        amount = 0
        maxAmount = 200
    }
    %RESOURCE[Waste]
    {
        amount = 0
        maxAmount = 10
    }
    %RESOURCE[Oxygen]
    {
        amount = 0
        maxAmount = 200
    }
    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}

