// =========================================================
// MOLDAVITE MACHINES SUPPORT
// Adds KickLifeSupport functionality to Moldavite Machines
// parts: greenhouses, algae farms, bioreactors, tanks
// =========================================================

// ---------------------------------------------------------
// Greenhouses — CDRA + per-size greenhouse converter
// ---------------------------------------------------------
@PART[mmgh-agr-1875]:FINAL:NEEDS[KickLifeSupport]
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Greenhouse
        startActionName = Start Greenhouse
        stopActionName = Stop Greenhouse
        toggleActionName = Toggle Greenhouse

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.02
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxygen
            Ratio = 0.01
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Food
            Ratio = 0.00004
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.00006
            DumpExcess = false
        }
    }

    %RESOURCE[Oxygen]
    {
        amount = 0
        maxAmount = 100
    }
    %RESOURCE[CarbonDioxide]
    {
        amount = 0
        maxAmount = 100
    }
    %RESOURCE[WasteWater]
    {
        amount = 0
        maxAmount = 10
    }
    %RESOURCE[Food]
    {
        amount = 0
        maxAmount = 10
    }
    %RESOURCE[Water]
    {
        amount = 0
        maxAmount = 10
    }
    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}

