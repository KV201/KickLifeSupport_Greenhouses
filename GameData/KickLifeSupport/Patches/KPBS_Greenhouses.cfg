// ---------------------------------------------------------
// Greenhouse — combined life-support converter
// WasteWater + CO₂ + EC → O₂ + Food + Water
// ---------------------------------------------------------
@PART[KKAOSS_Greenhouse_g]:NEEDS[KerbalPlanetaryBaseSystems]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
        greenhouseEfficiencyPerCrew = 1.2
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Greenhouse
        startActionName = Start Greenhouse
        stopActionName = Stop Greenhouse
        toggleActionName = Toggle Greenhouse
        autoActivate = false
        shutdownIfEmpty = true
        GeneratesHeat = false
        useSpecializedBonus = false

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.02
        }

        OUTPUT_RESOURCE
        {
            ResourceName = Oxygen
            Ratio = 0.0045
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Food
            Ratio = 0.00005
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.00005
            DumpExcess = false
        }
    }

    %RESOURCE[WasteWater]
    {
        amount = 50
        maxAmount = 50
    }
    %RESOURCE[Oxygen]
    {
        amount = 200
        maxAmount = 200
    }
    %RESOURCE[Water]
    {
        amount = 50
        maxAmount = 50
    }
    %RESOURCE[Food]
    {
        amount = 10
        maxAmount = 10
    }
    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }
}
