// Combo Life Support Wedge — CDRA + LiOH
// Already carries O2/H2/H2O; KLS can consume O2/H2O directly.
@PART[USComboLifesupportWedge]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }

    // For some reason it doesn't have food, so
    %RESOURCE[Food]
    {
        amount = 5
        maxAmount = 5

    }
}

// Elektron — CDRA + LiOH + water buffer
// Built-in electrolysis (Water+EC→O2+H2) works with KLS as-is.
@PART[USElektron]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }

    %RESOURCE[Water]
    {
        amount = 0
        maxAmount = 50
    }
}

// Sabatier — CDRA + LiOH + KLS-style Sabatier converter
// Part only loads when Kerbalism|TacLifeSupport is installed.
// Its built-in converter uses H2+CO2→Water+Methane; we add
// a KLS-style converter (CO2+EC→LF+OX+Water) alongside it.
@PART[USSabatier]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Sabatier
        startActionName = Start Sabatier
        stopActionName = Stop Sabatier
        toggleActionName = Toggle Sabatier

        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 2.0
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.01
        }
        OUTPUT_RESOURCE
        {
            ResourceName = LiquidFuel
            Ratio = 0.004
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxidizer
            Ratio = 0.005
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.001
            DumpExcess = false
        }
    }
}

// Water Purifier — CDRA + LiOH + water purifier converter
// Part only loads when Kerbalism|TacLifeSupport|SnacksUtils|USILifeSupport is installed.
// Built-in converter only added for TAC LS via MM; we provide a KLS converter always.
@PART[USWaterPurifier]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    %RESOURCE[LithiumHydroxide]
    {
        amount = 0.5
        maxAmount = 0.5
    }

    %RESOURCE[WasteWater]
    {
        amount = 0
        maxAmount = 5
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Water Purifier
        startActionName = Start Purifier
        stopActionName = Stop Purifier
        toggleActionName = Toggle Purifier

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.05
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.000045
            DumpExcess = false
        }
    }
}
