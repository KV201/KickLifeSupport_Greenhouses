// =========================================================
// US2 (Universal Storage 2) — KickLifeSupport support
// Adds KLS module (CDRA), LiOH cartridges, and KLS-style
// converters to US2 processor/life-support wedges.
//
// Parts that normally require other LS mods are provided
// as standalone PART definitions when those mods are absent.
// =========================================================

// Standalone US2 Sabatier — loads when no other LS mod provides it.
// The original USSabatier requires Kerbalism|TacLifeSupport.
PART:NEEDS[!Kerbalism,!TacLifeSupport]
{
    name = USSabatier
    module = Part
    author = Daishi, DMagic, and Paul Kingtiger
    manufacturer = #autoLOC_US_Manufacturer
    title = Universal Storage: Sabatier reactor
    category = Utility
    tags = Universal Storage Processor Sabatier
    description = The Sabatier unit uses large amounts of electricity to convert Carbon Dioxide into Liquid Fuel and Water.  The reactor generates large amounts of heat and cooling radiators are recommended.
    cost = 2970
    mass = 0.528
    maxTemp = 3200
    fuelCrossFeed = True
    bulkheadProfiles = wedge
    crashTolerance = 12
    TechRequired = electronics
    entryCost = 11000
    rescaleFactor = 1
    attachRules = 1,0,1,1,0
    angularDrag = 1
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.2

    DRAG_CUBE
    {
        cube = A0, 0.2726,0.8403,0.5549, 0.2724,0.8393,0.5033, 0.231,0.8465,0.4846, 0.2308,0.8587,0.4748, 0.1757,0.8398,0.7658, 0.1755,0.8704,0.7228, 0.04109,0.1781,0.02279, 0.4937,0.4209,0.7125
    }

    MODEL
    {
        model = UniversalStorage2/Parts/Processors/Sabatier
        scale = 1, 1, 1
    }

    NODE
    {
        name = attach
        transform = attach
        size = 0
        method = HINGE_JOINT
    }

    MODULE:NEEDS[KIS]
    {
        name = ModuleKISItem
        shortcutKeyAction = drop
        useName = use
        usableFromEva = true
        usableFromContainer = true
        usableFromPod = true
        usableFromEditor = false
        stackable = true
        volumeOverride = 0
        moveSndPath = KIS/Sounds/itemMove
        equipable = true
        equipMode = part
        equipSlot = Back
        equipSkill = <null>
        equipRemoveHelmet = false
        equipMeshName = jetpack_base01
        equipBoneName = aliasJetpack
        equipPos = (0,-0.05,-0.3)
        equipDir = (0,270,0)
        carriable = true
        allowPartAttach = 1
        allowStaticAttach = 0
    }

    RESOURCE
    {
        name = CarbonDioxide
        amount = 0
        maxAmount = 200
    }
    RESOURCE
    {
        name = Water
        amount = 0
        maxAmount = 50
    }
}

