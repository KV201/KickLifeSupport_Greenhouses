// ---------------------------------------------------------
// GREENHOUSE TIERS BY SIZE
// Flat production rates — no crew efficiency scaling.
// 1.25m = 2 kerbals, 2.5m = 4 kerbals,
// 3.75m = 6 kerbals, 5m = 8 kerbals.
// ---------------------------------------------------------

// 1.25m — supports ~2 kerbals
@PART[sspx-cupola-greenhouse-*]:FINAL
{
    %MODULE[KickLifeSupportModule]
    {
        name = KickLifeSupportModule
        isCDRA = true
        scrubberEnabled = true
    }

    MODULE
    {
        name = ModuleResourceConverter
        converterName = Greenhouse
        startActionName = Start Greenhouse
        stopActionName = Stop Greenhouse
        toggleActionName = Toggle Greenhouse

        INPUT_RESOURCE
        {
            ResourceName = WasteWater
            Ratio = 0.00005
        }
        INPUT_RESOURCE
        {
            ResourceName = CarbonDioxide
            Ratio = 0.005
        }
        INPUT_RESOURCE
        {
            ResourceName = Fertilizer
            Ratio = 0.00025
        }
        INPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 0.02
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Oxygen
            Ratio = 0.01
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Food
            Ratio = 0.00004
            DumpExcess = false
        }
        OUTPUT_RESOURCE
        {
            ResourceName = Water
            Ratio = 0.00006
            DumpExcess = false
        }
    }

    %RESOURCE[WasteWater] { amount = 25; maxAmount = 25; }
    %RESOURCE[Oxygen] { amount = 100; maxAmount = 100; }
    %RESOURCE[Water] { amount = 25; maxAmount = 25; }
    %RESOURCE[Food] { amount = 5; maxAmount = 5; }
    %RESOURCE[Fertilizer] { amount = 10; maxAmount = 10; }
    %RESOURCE[LithiumHydroxide] { amount = 0.5; maxAmount = 0.5; }
}

